<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Plano de Leitura 2026</title>
    <style>
        :root {
            --brand-lime: #d8ff2f;
            --brand-blue: #1d7bff;
            --brand-purple: #8a3dff;
            --brand-pink: #ff63c6;
            --brand-navy: #0c0a5a;
            --brand-cyan: #31d7e6;

            --bg: #050510;
            --panel: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.12);
            --text: #e2e8f0;
            --muted: rgba(226, 232, 240, 0.68);
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
            background: transparent;
            color: var(--text);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 12% 18%, rgba(49, 215, 230, 0.22) 0%, transparent 45%),
                radial-gradient(circle at 88% 22%, rgba(255, 99, 198, 0.18) 0%, transparent 42%),
                radial-gradient(circle at 90% 82%, rgba(216, 255, 47, 0.12) 0%, transparent 52%),
                radial-gradient(circle at 22% 85%, rgba(29, 123, 255, 0.14) 0%, transparent 52%),
                linear-gradient(180deg, #03030a 0%, var(--bg) 100%);
        }

        body {
            position: relative;
        }

        .app {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100%;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 5;
            padding: 12px 12px 10px;
            background: rgba(5, 5, 16, 0.55);
            -webkit-backdrop-filter: blur(14px);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        @supports not ((-webkit-backdrop-filter: blur(1px)) or (backdrop-filter: blur(1px))) {
            .topbar {
                background: rgba(5, 5, 16, 0.92);
            }
        }

        .title {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            padding: 0 2px;
        }

        .titleText {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .appLogo {
            width: 26px;
            height: 26px;
            flex: 0 0 auto;
        }

        .appLogo svg {
            width: 100%;
            height: 100%;
            display: block;
            fill: rgba(49, 215, 230, 0.92);
            filter: drop-shadow(0 0 10px rgba(49, 215, 230, 0.28));
        }

        .title h1 {
            margin: 0;
            font-size: 18px;
            letter-spacing: -0.8px;
            text-transform: uppercase;
        }

        .title h1 .brand {
            font-weight: 900;
            color: var(--text);
        }

        .title h1 .accent {
            font-weight: 900;
            color: var(--brand-cyan);
        }

        .nav {
            display: grid;
            grid-template-columns: 44px 1fr 44px;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .progress {
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            background: rgba(255, 255, 255, 0.04);
        }

        .progressTop {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
        }

        .progressTop .label {
            font-size: 11px;
            color: rgba(226, 232, 240, 0.72);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .progressTop .value {
            font-size: 12px;
            font-weight: 900;
            color: rgba(226, 232, 240, 0.92);
        }

        .progressBar {
            height: 8px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.10);
        }

        .progressBar > div {
            height: 100%;
            width: 0%;
            background: rgba(226, 232, 240, 0.85);
            border-radius: 999px;
        }

        .nav button {
            height: 40px;
            border-radius: 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
        }

        .nav button:disabled {
            opacity: 0.35;
            cursor: default;
        }

        .nav button:active { transform: translateY(1px); }

        .monthTitle {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: linear-gradient(135deg, rgba(14, 19, 43, 0.78), rgba(7, 9, 20, 0.88));
        }

        .monthTitle .m {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: -0.2px;
        }

        .monthTitle .y {
            font-size: 11px;
            color: var(--muted);
        }

        .week {
            margin-top: 14px;
            display: grid;
            padding: 0 12px;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            color: rgba(226, 232, 240, 0.75);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .week div { text-align: center; }

        .grid {
            margin-top: 10px;
            padding: 0 12px;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .cell {
            position: relative;
            aspect-ratio: 1 / 1;
            border-radius: 14px;
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.10);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            padding: 0;
        }

        .cell[aria-disabled="true"] {
            opacity: 0.35;
            cursor: default;
        }

        .cell .d {
            font-weight: 800;
            font-size: 13px;
            color: var(--text);
        }

        .cell.hasReading {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.18);
        }

        .cell.hasReading::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 999px;
            background: rgba(226, 232, 240, 0.85);
            bottom: 8px;
            right: 8px;
            opacity: 1;
        }

        .cell.isToday {
            outline: 2px solid rgba(216, 255, 47, 0.55);
            outline-offset: 2px;
        }

        .cell.isSelected {
            border-color: rgba(216, 255, 47, 0.55);
            background: rgba(216, 255, 47, 0.12);
        }

        .hint {
            margin-top: 12px;
            padding: 12px 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--muted);
            font-size: 12px;
            line-height: 1.35;
        }

        .reflections {
            margin-top: 12px;
            padding: 12px;
            margin-left: 12px;
            margin-right: 12px;
            border-radius: 14px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .reflectionsHeader {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .reflectionsHeader .h {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: rgba(226, 232, 240, 0.78);
            margin: 0;
        }

        .reflectionsHeader .date {
            font-size: 11px;
            color: var(--muted);
        }

        .reflectionList {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .reflectionCard {
            padding: 12px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
        }

        .reflectionMeta {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
        }

        .reflectionMeta .name {
            font-weight: 900;
            font-size: 13px;
            letter-spacing: -0.2px;
            color: rgba(226, 232, 240, 0.92);
        }

        .reflectionMeta .time {
            font-size: 11px;
            color: var(--muted);
        }

        .reflectionText {
            font-size: 13px;
            line-height: 1.45;
            color: rgba(226, 232, 240, 0.88);
            white-space: pre-wrap;
        }

        .reflectionsState {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.4;
        }

        .sheetOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.62);
            display: none;
            align-items: flex-end;
            justify-content: center;
            padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
            z-index: 20;
        }

        .sheetOverlay.open { display: flex; }

        .sheet {
            width: min(430px, 100%);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: linear-gradient(180deg, rgba(10, 10, 25, 0.98) 0%, rgba(6, 6, 16, 0.98) 100%);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
            overflow: hidden;
        }

        .sheetHandle {
            height: 4px;
            width: 46px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
            margin: 10px auto 0;
        }

        .sheetHeader {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 14px 14px 10px;
        }

        .sheetHeader .date {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sheetHeader .date .day {
            font-weight: 900;
            letter-spacing: -0.4px;
            font-size: 14px;
        }

        .sheetHeader .date .sub {
            font-size: 12px;
            color: var(--muted);
        }

        .sheetHeader button {
            height: 38px;
            width: 38px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
        }

        .sheetContent {
            padding: 0 14px 16px;
        }

        .reading {
            padding: 14px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
        }

        .reading .label {
            font-size: 11px;
            color: rgba(226, 232, 240, 0.7);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .reading .text {
            margin-top: 8px;
            font-size: 16px;
            font-weight: 900;
            letter-spacing: -0.4px;
            line-height: 1.15;
            background: linear-gradient(90deg, var(--brand-cyan), var(--brand-pink), var(--brand-lime));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .readingInline {
            margin-top: 12px;
            margin-left: 12px;
            margin-right: 12px;
            padding: 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .readingInlineHeader {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .readingInlineHeader .h {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: rgba(226, 232, 240, 0.78);
            margin: 0;
        }

        .readingInlineHeader .date {
            font-size: 11px;
            color: var(--muted);
        }

        @media (prefers-reduced-motion: reduce) {
            .nav button:active { transform: none; }
        }
    </style>
</head>

        <div class="topbar">
            <div class="title">
                <div class="titleText">

                </div>

            <div class="nav">

                <div class="monthTitle" role="status" aria-live="polite">

                <div class="progressBar" aria-hidden="true"><div id="progressFill"></div></div>
            </div>
        </div>

        <div class="week" aria-hidden="true">

            <div>Seg</div>
            <div>Ter</div>
            <div>Qua</div>
            <div>Qui</div>
            <div>Sex</div>
            <div>Sáb</div>
        </div>

        <div class="grid" id="calendarGrid" role="grid" aria-label="Calendário"></div>

        <section class="readingInline" aria-live="polite">
            <div class="readingInlineHeader">
                <p class="h">Leitura do dia</p>
                <div class="date" id="readingDate">—</div>
            </div>
            <div class="reading">
                <div class="label">Leitura</div>
                <div class="text" id="readingText">—</div>
            </div>
        </section>

        <section class="reflections" aria-live="polite">
            <div class="reflectionsHeader">
                <p class="h">Reflexões do dia</p>
                <div class="date" id="refDate">—</div>
            </div>
            <div class="reflectionsState" id="refState">Carregando reflexões…</div>
            <div class="reflectionList" id="refList" style="display:none;"></div>
        </section>
    </div>

        <!-- Para cobrir o ano inteiro, copie os blocos de Março..Dezembro do index.html
             e cole aqui dentro, mantendo a estrutura month-card/month-name/day-num/reading-text. -->
    </template>

    <script>
        const YEAR = 2026;
        const REFLECTIONS_URL = 'https://missao-api-67a4018a1826.herokuapp.com/api/sheets/read?spreadsheetId=1FuTkg3ngUbkz8Kq-XNL9o7R82ydb6FpiYoKWYdXZQcA&range=A:E';
        const MONTHS_PT = [
            'Janeiro',
            'Fevereiro',
            'Março',
            'Abril',
            'Maio',
            'Junho',
            'Julho',
            'Agosto',
            'Setembro',
            'Outubro',
            'Novembro',
            'Dezembro',
        ];

        const monthNameToIndex = new Map(MONTHS_PT.map((m, i) => [m.toLowerCase(), i]));

        function pad2(n) {
            return String(n).padStart(2, '0');
        }

        function isoDate(y, mIndex, d) {
            return `${y}-${pad2(mIndex + 1)}-${pad2(d)}`;
        }

        function parsePlanFromTemplate() {
            const tpl = document.getElementById('planSource');
            const frag = tpl.content.cloneNode(true);
            const map = new Map();

            frag.querySelectorAll('.month-card').forEach((card) => {
                const rawMonth = (card.querySelector('.month-name')?.textContent || '').trim();
                const monthKey = rawMonth.toLowerCase();
                const monthIndex = monthNameToIndex.get(monthKey);
                if (monthIndex === undefined) return;

                card.querySelectorAll('tr').forEach((tr) => {
                    const dayStr = (tr.querySelector('.day-num')?.textContent || '').trim();
                    const reading = (tr.querySelector('.reading-text')?.textContent || '').trim();
                    const day = Number(dayStr);
                    if (!Number.isFinite(day) || day <= 0) return;
                    if (!reading) return;
                    map.set(isoDate(YEAR, monthIndex, day), reading);
                });
            });

            return map;
        }

        const plan = parsePlanFromTemplate();

        const reflectionsState = {
            loading: true,
            error: null,
            byDate: new Map(),
        };

        const state = {
            monthIndex: 0,
            selectedDate: null,
        };

        const els = {
            monthLabel: document.getElementById('monthLabel'),
            yearLabel: document.getElementById('yearLabel'),
            grid: document.getElementById('calendarGrid'),
            prev: document.getElementById('prevMonth'),
            next: document.getElementById('nextMonth'),
            progressValue: document.getElementById('progressValue'),
            progressFill: document.getElementById('progressFill'),
            readingDate: document.getElementById('readingDate'),
            readingText: document.getElementById('readingText'),
            refDate: document.getElementById('refDate'),
            refState: document.getElementById('refState'),
            refList: document.getElementById('refList'),
        };

        function toBool(value) {
            if (typeof value === 'boolean') return value;
            const s = String(value ?? '').trim().toLowerCase();
            return s === 'true' || s === '1' || s === 'sim' || s === 'yes';
        }

        function parsePtBrSheetTimestamp(ts) {
            const raw = String(ts ?? '').trim();
            if (!raw) return null;
            const [datePart, timePart] = raw.split(' ');
            if (!datePart) return null;
            const [dd, mm, yyyy] = datePart.split('/').map((x) => Number(x));
            if (!Number.isFinite(dd) || !Number.isFinite(mm) || !Number.isFinite(yyyy)) return null;
            let hh = 0;
            let min = 0;
            let ss = 0;
            if (timePart) {
                const [hhs, mins, sss] = timePart.split(':').map((x) => Number(x));
                if (Number.isFinite(hhs)) hh = hhs;
                if (Number.isFinite(mins)) min = mins;
                if (Number.isFinite(sss)) ss = sss;
            }
            return new Date(yyyy, mm - 1, dd, hh, min, ss);
        }

        function dateKeyFromSheetItem(item) {
            const dt = parsePtBrSheetTimestamp(item?.['Carimbo de data/hora']);
            if (!dt) return null;
            return isoDate(dt.getFullYear(), dt.getMonth(), dt.getDate());
        }

        function formatDateKeyToPt(dateKey) {
            if (!dateKey) return '—';
            const [y, m, d] = dateKey.split('-').map((x) => Number(x));
            const monthName = MONTHS_PT[(m || 1) - 1] || '—';
            return `${pad2(d)} de ${monthName} de ${y}`;
        }

        function formatTimeFromTimestamp(ts) {
            const dt = parsePtBrSheetTimestamp(ts);
            if (!dt) return '';
            return `${pad2(dt.getHours())}:${pad2(dt.getMinutes())}`;
        }

        function activeDateKey() {
            if (state.selectedDate) return state.selectedDate;
            const now = new Date();
            if (now.getFullYear() === YEAR) {
                return isoDate(YEAR, now.getMonth(), now.getDate());
            }
            return null;
        }

        function dayOfYear(dateKey) {
            if (!dateKey) return null;
            const [y, m, d] = dateKey.split('-').map((x) => Number(x));
            if (!Number.isFinite(y) || !Number.isFinite(m) || !Number.isFinite(d)) return null;
            const dt = new Date(y, m - 1, d);
            const start = new Date(y, 0, 1);
            const diffDays = Math.floor((dt - start) / 86400000) + 1;
            return Number.isFinite(diffDays) ? diffDays : null;
        }

        function renderProgress() {
            const key = activeDateKey();
            const doy = dayOfYear(key);
            if (!doy || doy < 1 || doy > 366) {
                els.progressValue.textContent = 'Dia — de 365';
                els.progressFill.style.width = '0%';
                return;
            }

            const totalDays = 365;
            const clamped = Math.min(Math.max(doy, 1), totalDays);
            const pct = (clamped / totalDays) * 100;
            els.progressValue.textContent = `Dia ${clamped} de ${totalDays}`;
            els.progressFill.style.width = `${pct}%`;
        }

        function renderReading() {
            const key = activeDateKey();
            els.readingDate.textContent = formatDateKeyToPt(key);
            if (!key) {
                els.readingText.textContent = 'Selecione um dia';
                return;
            }
            els.readingText.textContent = plan.get(key) || 'Sem leitura cadastrada';
        }

        function renderReflections() {
            const key = activeDateKey();
            els.refDate.textContent = formatDateKeyToPt(key);

            if (reflectionsState.loading) {
                els.refList.style.display = 'none';
                els.refState.style.display = 'block';
                els.refState.textContent = 'Carregando reflexões…';
                return;
            }

            if (reflectionsState.error) {
                els.refList.style.display = 'none';
                els.refState.style.display = 'block';
                els.refState.textContent = 'Não foi possível carregar as reflexões.';
                return;
            }

            if (!key) {
                els.refList.style.display = 'none';
                els.refState.style.display = 'block';
                els.refState.textContent = 'Selecione um dia para ver reflexões.';
                return;
            }

            const list = reflectionsState.byDate.get(key) || [];
            if (!list.length) {
                els.refList.style.display = 'none';
                els.refState.style.display = 'block';
                els.refState.textContent = 'Nenhuma reflexão para este dia.';
                return;
            }

            els.refState.style.display = 'none';
            els.refList.style.display = 'flex';
            els.refList.innerHTML = '';

            list.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'reflectionCard';

                const meta = document.createElement('div');
                meta.className = 'reflectionMeta';

                const name = document.createElement('div');
                name.className = 'name';
                name.textContent = String(item?.['Seu Nome Completo'] ?? 'Anônimo').trim() || 'Anônimo';

                const time = document.createElement('div');
                time.className = 'time';
                time.textContent = formatTimeFromTimestamp(item?.['Carimbo de data/hora']);

                meta.appendChild(name);
                meta.appendChild(time);

                const text = document.createElement('div');
                text.className = 'reflectionText';
                text.textContent = String(item?.['Sua Reflexão e Devocional'] ?? '').trim();

                card.appendChild(meta);
                card.appendChild(text);
                els.refList.appendChild(card);
            });
        }

        async function fetchReflections() {
            reflectionsState.loading = true;
            reflectionsState.error = null;
            renderReflections();

            try {
                const res = await fetch(REFLECTIONS_URL);
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }
                const data = await res.json();
                const rows = Array.isArray(data) ? data : (Array.isArray(data?.data) ? data.data : []);

                const byDate = new Map();
                rows.forEach((item) => {
                    if (!toBool(item?.Exibir)) return;
                    const key = dateKeyFromSheetItem(item);
                    if (!key) return;
                    const arr = byDate.get(key) || [];
                    arr.push(item);
                    byDate.set(key, arr);
                });

                reflectionsState.byDate = byDate;
                reflectionsState.loading = false;
                reflectionsState.error = null;
                renderReflections();
            } catch (err) {
                reflectionsState.loading = false;
                reflectionsState.error = err;
                renderReflections();
            }
        }

        function daysInMonth(year, monthIndex) {
            return new Date(year, monthIndex + 1, 0).getDate();
        }

        function firstDayOfMonth(year, monthIndex) {
            return new Date(year, monthIndex, 1).getDay();
        }

        function isToday(y, mIndex, d) {
            const t = new Date();
            return t.getFullYear() === y && t.getMonth() === mIndex && t.getDate() === d;
        }

        function render() {
            els.monthLabel.textContent = MONTHS_PT[state.monthIndex];
            els.yearLabel.textContent = String(YEAR);

            els.prev.disabled = state.monthIndex === 0;
            els.next.disabled = state.monthIndex === 11;

            els.grid.innerHTML = '';

            const total = daysInMonth(YEAR, state.monthIndex);
            const offset = firstDayOfMonth(YEAR, state.monthIndex);

            for (let i = 0; i < offset; i++) {
                const empty = document.createElement('div');
                empty.className = 'cell';
                empty.setAttribute('aria-disabled', 'true');
                empty.tabIndex = -1;
                els.grid.appendChild(empty);
            }

            for (let d = 1; d <= total; d++) {
                const dateKey = isoDate(YEAR, state.monthIndex, d);
                const hasReading = plan.has(dateKey);

                const cell = document.createElement('button');
                cell.type = 'button';
                cell.className = 'cell';
                if (hasReading) cell.classList.add('hasReading');
                if (isToday(YEAR, state.monthIndex, d)) cell.classList.add('isToday');
                if (state.selectedDate === dateKey) cell.classList.add('isSelected');

                cell.setAttribute('role', 'gridcell');
                cell.setAttribute('aria-label', `${d} de ${MONTHS_PT[state.monthIndex]}`);

                const span = document.createElement('span');
                span.className = 'd';
                span.textContent = String(d);
                cell.appendChild(span);

                cell.addEventListener('click', () => {
                    state.selectedDate = dateKey;
                    render();
                });

                els.grid.appendChild(cell);
            }

            renderReflections();
            renderReading();
            renderProgress();
        }

        els.prev.addEventListener('click', () => {
            state.monthIndex = Math.max(0, state.monthIndex - 1);
            state.selectedDate = null;
            render();
        });

        els.next.addEventListener('click', () => {
            state.monthIndex = Math.min(11, state.monthIndex + 1);
            state.selectedDate = null;
            render();
        });

        (function init() {
            const now = new Date();
            if (now.getFullYear() === YEAR) {
                state.monthIndex = now.getMonth();
            }
            render();
            fetchReflections();
        })();
    </script>
</body>
</html>
