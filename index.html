<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Missão Jovem - Scroll Bible 2026 - Plano de Leitura</title>
    <meta name="description" content="Plano de leitura bíblica 2026 para a Missão Jovem">
    <meta name="keywords" content="missão jovem, scroll bible, plano de leitura, bíblia, 2026">
    <link rel="icon" type="image/svg+xml" href="images/icons/favicon.svg" />
    <style>
        :root {
            --brand-lime: #d8ff2f;
            --brand-blue: #1d7bff;
            --brand-purple: #8a3dff;
            --brand-pink: #ff63c6;
            --brand-navy: #0c0a5a;
            --brand-cyan: #31d7e6;

            --bg: #050510;
            --panel: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.12);
            --text: #e2e8f0;
            --muted: rgba(226, 232, 240, 0.68);

            --title-h: 0px;
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
            background: transparent;
            color: var(--text);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 12% 18%, rgba(49, 215, 230, 0.22) 0%, transparent 45%),
                radial-gradient(circle at 88% 22%, rgba(255, 99, 198, 0.18) 0%, transparent 42%),
                radial-gradient(circle at 90% 82%, rgba(216, 255, 47, 0.12) 0%, transparent 52%),
                radial-gradient(circle at 22% 85%, rgba(29, 123, 255, 0.14) 0%, transparent 52%),
                linear-gradient(180deg, #03030a 0%, var(--bg) 100%);
        }

        body {
            position: relative;
        }

        .app {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100%;
        }

        .topbar {
            position: relative;
            padding: var(--title-h) 0 0;
        }

        .title {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: min(430px, 100%);
            z-index: 5;
            padding: 12px 12px 10px;
            background: rgba(5, 5, 16, 0.55);
            -webkit-backdrop-filter: blur(14px);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            padding-left: 12px;
            padding-right: 12px;
        }

        @supports not ((-webkit-backdrop-filter: blur(1px)) or (backdrop-filter: blur(1px))) {
            .title {
                background: rgba(5, 5, 16, 0.92);
            }
        }

        .titleText {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .appLogo {
            width: 26px;
            height: 26px;
            flex: 0 0 auto;
        }

        .appLogo svg {
            width: 100%;
            height: 100%;
            display: block;
            fill: rgba(49, 215, 230, 0.92);
            filter: drop-shadow(0 0 10px rgba(49, 215, 230, 0.28));
        }

        .title h1 {
            margin: 0;
            font-size: 18px;
            letter-spacing: -0.8px;
            text-transform: uppercase;
        }

        .title h1 .brand {
            font-weight: 900;
            color: var(--text);
        }

        .title h1 .accent {
            font-weight: 900;
            color: var(--brand-cyan);
        }

        .nav {
            display: grid;
            grid-template-columns: 44px 1fr 44px;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            padding: 0 12px;
        }

        .progress {
            margin-top: 10px;
            margin-left: 12px;
            margin-right: 12px;
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            background: rgba(255, 255, 255, 0.04);
        }

        .progressTop {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
        }

        .progressTop .label {
            font-size: 11px;
            color: rgba(226, 232, 240, 0.72);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .progressTop .value {
            font-size: 12px;
            font-weight: 900;
            color: rgba(226, 232, 240, 0.92);
        }

        .progressBar {
            height: 8px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.10);
        }

        .progressBar > div {
            height: 100%;
            width: 0%;
            background: rgba(226, 232, 240, 0.85);
            border-radius: 999px;
        }

        .nav button {
            height: 40px;
            border-radius: 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
        }

        .nav button:disabled {
            opacity: 0.35;
            cursor: default;
        }

        .nav button:active { transform: translateY(1px); }

        .monthTitle {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: linear-gradient(135deg, rgba(14, 19, 43, 0.78), rgba(7, 9, 20, 0.88));
        }

        .monthTitle .m {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: -0.2px;
        }

        .monthTitle .y {
            font-size: 11px;
            color: var(--muted);
        }

        .week {
            margin-top: 14px;
            display: grid;
            padding: 0 12px;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            color: rgba(226, 232, 240, 0.75);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .week div { text-align: center; }

        .grid {
            margin-top: 10px;
            padding: 0 12px;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .cell {
            position: relative;
            aspect-ratio: 1 / 1;
            border-radius: 14px;
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.10);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            padding: 0;
        }

        .cell[aria-disabled="true"] {
            opacity: 0.35;
            cursor: default;
        }

        .cell .d {
            font-weight: 800;
            font-size: 13px;
            color: var(--text);
        }

        .cell.hasReading {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.18);
        }

        .cell.hasReading::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 999px;
            background: rgba(226, 232, 240, 0.85);
            bottom: 8px;
            right: 8px;
            opacity: 1;
        }

        .cell.isToday {
            outline: 2px solid rgba(216, 255, 47, 0.55);
            outline-offset: 2px;
        }

        .cell.isSelected {
            border-color: rgba(216, 255, 47, 0.55);
            background: rgba(216, 255, 47, 0.12);
        }

        .hint {
            margin-top: 12px;
            padding: 12px 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--muted);
            font-size: 12px;
            line-height: 1.35;
        }

        .reflections {
            margin-top: 12px;
            padding: 12px;
            margin-left: 12px;
            margin-right: 12px;
            border-radius: 14px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .reflectionsHeader {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .reflectionsHeader .h {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: rgba(226, 232, 240, 0.78);
            margin: 0;
        }

        .reflectionsHeader .date {
            font-size: 11px;
            color: var(--muted);
        }

        .reflectionList {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .reflectionCard {
            padding: 12px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .reflectionCard.featured {
            border-color: rgba(49, 215, 230, 0.55);
            background: rgba(49, 215, 230, 0.08);
            box-shadow: 0 12px 30px rgba(49, 215, 230, 0.10);
        }

        .reflectionMeta {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
        }

        .reflectionMeta .name {
            font-weight: 900;
            font-size: 13px;
            letter-spacing: -0.2px;
            color: rgba(226, 232, 240, 0.92);
        }

        .reflectionMeta .time {
            font-size: 11px;
            color: var(--muted);
        }

        .reflectionText {
            font-size: 13px;
            line-height: 1.45;
            color: rgba(226, 232, 240, 0.88);
            white-space: pre-wrap;
        }

        .reflectionText.clamped {
            max-height: 92px;
            overflow: hidden;
        }

        .reflectionCard.expanded .reflectionText {
            max-height: none;
            overflow: visible;
        }

        .refMore {
            margin-top: 10px;
            height: 34px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.06);
            color: rgba(226, 232, 240, 0.92);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: -0.2px;
            padding: 0 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            align-self: flex-start;
        }

        .reflectionsState {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.4;
        }

        .sheetOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.62);
            display: none;
            align-items: flex-end;
            justify-content: center;
            padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
            z-index: 20;
        }

        .sheetOverlay.open { display: flex; }

        .sheet {
            width: min(430px, 100%);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: linear-gradient(180deg, rgba(10, 10, 25, 0.98) 0%, rgba(6, 6, 16, 0.98) 100%);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
            overflow: hidden;
        }

        .sheetHandle {
            height: 4px;
            width: 46px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
            margin: 10px auto 0;
        }

        .sheetHeader {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 14px 14px 10px;
        }

        .sheetHeader .date {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sheetHeader .date .day {
            font-weight: 900;
            letter-spacing: -0.4px;
            font-size: 14px;
        }

        .sheetHeader .date .sub {
            font-size: 12px;
            color: var(--muted);
        }

        .sheetHeader button {
            height: 38px;
            width: 38px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
        }

        .sheetContent {
            padding: 0 14px 16px;
        }

        .reading {
            padding: 14px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
        }

        .reading .label {
            font-size: 11px;
            color: rgba(226, 232, 240, 0.7);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .reading .text {
            margin-top: 8px;
            font-size: 16px;
            font-weight: 900;
            letter-spacing: -0.4px;
            line-height: 1.15;
            background: linear-gradient(90deg, var(--brand-cyan), var(--brand-pink), var(--brand-lime));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .readingInline {
            margin-top: 12px;
            margin-left: 12px;
            margin-right: 12px;
            padding: 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .readingInlineHeader {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .readingInlineHeader .h {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: rgba(226, 232, 240, 0.78);
            margin: 0;
        }

        .readingInlineHeader .date {
            font-size: 11px;
            color: var(--muted);
        }

        .storyBtn {
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.06);
            color: rgba(226, 232, 240, 0.92);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: -0.2px;
            padding: 0 12px;
            cursor: pointer;
            white-space: nowrap;
        }

        .storyBtn svg {
            width: 16px;
            height: 16px;
            display: block;
            fill: currentColor;
            opacity: 0.92;
        }

        .pulseHint {
            animation: pulseHint 1.8s ease-in-out infinite;
        }

        @keyframes pulseHint {
            0% {
                transform: translateZ(0) scale(1);
                box-shadow: 0 0 0 rgba(49, 215, 230, 0.0);
            }
            50% {
                transform: translateZ(0) scale(1.02);
                box-shadow: 0 0 0 6px rgba(49, 215, 230, 0.10);
            }
            100% {
                transform: translateZ(0) scale(1);
                box-shadow: 0 0 0 rgba(49, 215, 230, 0.0);
            }
        }

        .storyBtn:disabled {
            opacity: 0.45;
            cursor: default;
        }

        .storyPanel {
            margin-top: 10px;
            padding: 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .storyPanelTop {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .storyPanelTop .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: rgba(226, 232, 240, 0.78);
            margin: 0;
        }

        .storyActions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .storyPreviewWrap {
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.10);
            background: rgba(0, 0, 0, 0.22);
            width: 100%;
            aspect-ratio: 9 / 16;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #storyPreview {
            width: 100%;
            height: 100%;
            display: block;
        }

        .storyModalContent {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .storyModalActions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        @media (prefers-reduced-motion: reduce) {
            .nav button:active { transform: none; }
            .pulseHint { animation: none; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="title">
                <div class="titleText">
                    <h1><span class="brand">Scroll</span> <span class="accent">Bible</span> 2026</h1>
                    <div style="font-size: 11px; color: rgba(226, 232, 240, 0.7);">Trocando o feed, pela fome.</div>
                </div>
                <div class="appLogo" aria-hidden="true">
                    <svg viewBox="0 0 10760 10000" xmlns="http://www.w3.org/2000/svg"><path d="M4537 9970 c-33 -39 -41 -79 -26 -132 10 -39 201 -232 1970 -1999 l1958 -1956 42 -89 c63 -136 78 -189 89 -304 6 -58 13 -566 16 -1130 l6 -1025 -1283 1280 c-1174 1171 -1351 1346 -1519 1500 -79 73 -116 93 -226 120 -170 44 -351 32 -473 -30 -60 -30 -301 -265 -1801 -1762 l-1105 -1102 -5 1427 -5 1427 -43 75 c-66 115 -105 163 -163 202 -63 42 -155 82 -237 103 -79 21 -432 28 -923 18 l-396 -8 -88 -44 c-117 -58 -200 -140 -254 -254 -78 -163 -72 93 -68 -2668 2 -1880 6 -2493 15 -2551 14 -84 68 -252 109 -332 110 -218 298 -421 511 -550 113 -69 210 -109 362 -149 108 -28 127 -30 300 -30 133 -1 208 4 265 16 173 35 357 110 490 200 78 53 240 212 1745 1712 690 687 1330 1324 1422 1415 l167 164 1468 -1465 c1414 -1410 1773 -1762 1865 -1829 213 -155 492 -231 798 -217 284 12 547 109 754 276 88 71 214 213 285 321 93 143 181 375 181 481 0 26 5 51 10 54 7 4 10 737 10 2166 0 1438 -3 2158 -10 2154 -7 -4 -10 84 -10 257 0 145 -5 292 -10 328 -30 185 -182 537 -330 760 -161 244 -121 201 -1724 1808 l-1201 1204 -140 69 c-146 71 -230 99 -302 99 -23 0 -45 5 -48 10 -4 7 -420 10 -1215 10 l-1208 0 -25 -30z"/></svg>
                </div>
            </div>

            <div class="nav">
                <button id="prevMonth" type="button" aria-label="Mês anterior">‹</button>
                <div class="monthTitle" role="status" aria-live="polite">
                    <div class="m" id="monthLabel">—</div>
                    <div class="y" id="yearLabel">—</div>
                </div>
                <button id="nextMonth" type="button" aria-label="Próximo mês">›</button>
            </div>

            <div class="progress" aria-live="polite">
                <div class="progressTop">
                    <div class="label">Progresso</div>
                    <div class="value" id="progressValue">Dia — de 365</div>
                </div>
                <div class="progressBar" aria-hidden="true"><div id="progressFill"></div></div>
            </div>
        </div>

        <div class="week" aria-hidden="true">
            <div>Dom</div>
            <div>Seg</div>
            <div>Ter</div>
            <div>Qua</div>
            <div>Qui</div>
            <div>Sex</div>
            <div>Sáb</div>
        </div>

        <div class="grid" id="calendarGrid" role="grid" aria-label="Calendário"></div>

        <section class="readingInline" aria-live="polite">
            <div class="readingInlineHeader">
                <p class="h">Leitura do dia</p>
                <div style="display:flex; align-items:center; gap:10px;">
                    <div class="date" id="readingDate">—</div>
                    <button class="storyBtn" id="openStoryModal" type="button">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                        Compartilhe
                    </button>
                </div>
            </div>
            <div class="reading">
                <div class="label">Leitura</div>
                <div class="text" id="readingText">—</div>
            </div>
        </section>

        <div class="sheetOverlay" id="storyModal">
            <div class="sheet" role="dialog" aria-modal="true" aria-label="Criar Stories">
                <div class="sheetHandle"></div>
                <div class="sheetHeader">
                    <div class="date">
                        <div class="day">Stories</div>
                        <div class="sub">Escolha uma foto e compartilhe</div>
                    </div>
                    <button id="closeStoryModal" type="button" aria-label="Fechar">×</button>
                </div>
                <div class="sheetContent storyModalContent">
                    <div class="storyPreviewWrap">
                        <canvas id="storyPreview" width="450" height="800" aria-label="Pré-visualização do Stories"></canvas>
                    </div>
                    <div class="storyModalActions">
                        <input id="storyPhotoInput" type="file" accept="image/*" capture="environment" style="display:none;" />
                        <button class="storyBtn" id="pickStoryPhoto" type="button">Selecione a Foto</button>
                        <button class="storyBtn" id="shareComposedStory" type="button" disabled>
                            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                            Compartilhar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <section class="reflections" aria-live="polite">
            <div class="reflectionsHeader">
                <p class="h">Reflexões do dia</p>
                <div class="date" id="refDate">—</div>
            </div>
            <div class="reflectionsState" id="refState">Carregando reflexões…</div>
            <div class="reflectionList" id="refList" style="display:none;"></div>
        </section>
    </div>

    <template id="planSource">
        <div class="month-card">
            <div class="month-name">Janeiro</div>
            <div class="days-grid">
                <table>
                    <tr><td><span class="day-num">01</span><span class="reading-text">Gn 1-3</span></td></tr>
                    <tr><td><span class="day-num">02</span><span class="reading-text">Gn 4-7</span></td></tr>
                    <tr><td><span class="day-num">03</span><span class="reading-text">Gn 8-11</span></td></tr>
                    <tr><td><span class="day-num">04</span><span class="reading-text">Gn 12-15</span></td></tr>
                    <tr><td><span class="day-num">05</span><span class="reading-text">Gn 16-18</span></td></tr>
                    <tr><td><span class="day-num">06</span><span class="reading-text">Gn 19-21</span></td></tr>
                    <tr><td><span class="day-num">07</span><span class="reading-text">Gn 22-24</span></td></tr>
                    <tr><td><span class="day-num">08</span><span class="reading-text">Gn 25-26</span></td></tr>
                    <tr><td><span class="day-num">09</span><span class="reading-text">Gn 27-28</span></td></tr>
                    <tr><td><span class="day-num">10</span><span class="reading-text">Gn 29-30</span></td></tr>

            const raw = String(ts ?? '').trim();
            if (!raw) return null;
            const [datePart, timePart] = raw.split(' ');
            if (!datePart) return null;
            const [dd, mm, yyyy] = datePart.split('/').map((x) => Number(x));
            if (!Number.isFinite(dd) || !Number.isFinite(mm) || !Number.isFinite(yyyy)) return null;
            let hh = 0;
            let min = 0;
            let ss = 0;
            if (timePart) {
                const [hhs, mins, sss] = timePart.split(':').map((x) => Number(x));
                if (Number.isFinite(hhs)) hh = hhs;
                if (Number.isFinite(mins)) min = mins;
                if (Number.isFinite(sss)) ss = sss;
            }
            return new Date(yyyy, mm - 1, dd, hh, min, ss);
        }

        function dateKeyFromSheetItem(item) {
            const dt = parsePtBrSheetTimestamp(item?.['Carimbo de data/hora']);
            if (!dt) return null;
            return isoDate(dt.getFullYear(), dt.getMonth(), dt.getDate());
        }

        function formatDateKeyToPt(dateKey) {
            if (!dateKey) return '—';
            const [y, m, d] = dateKey.split('-').map((x) => Number(x));
            const monthName = MONTHS_PT[(m || 1) - 1] || '—';
            return `${pad2(d)} de ${monthName} de ${y}`;
        }

        function formatTimeFromTimestamp(ts) {
            const dt = parsePtBrSheetTimestamp(ts);
            if (!dt) return '';
            return `${pad2(dt.getHours())}:${pad2(dt.getMinutes())}`;
        }

        function activeDateKey() {
            if (state.selectedDate) return state.selectedDate;
            const now = new Date();
            if (now.getFullYear() === YEAR) {
                return isoDate(YEAR, now.getMonth(), now.getDate());
            }
            return null;
        }

        function dayOfYear(dateKey) {
            if (!dateKey) return null;
            const [y, m, d] = dateKey.split('-').map((x) => Number(x));
            if (!Number.isFinite(y) || !Number.isFinite(m) || !Number.isFinite(d)) return null;
            const dt = new Date(y, m - 1, d);
            const start = new Date(y, 0, 1);
            const diffDays = Math.floor((dt - start) / 86400000) + 1;
            return Number.isFinite(diffDays) ? diffDays : null;
        }

        function renderProgress() {
            const key = activeDateKey();
            const doy = dayOfYear(key);
            if (!doy || doy < 1 || doy > 366) {
                els.progressValue.textContent = 'Dia — de 365';
                els.progressFill.style.width = '0%';
                return;
            }

            const totalDays = 365;
            const clamped = Math.min(Math.max(doy, 1), totalDays);
            const pct = (clamped / totalDays) * 100;
            els.progressValue.textContent = `Dia ${clamped} de ${totalDays}`;
            els.progressFill.style.width = `${pct}%`;
        }

        function getStoryData() {
            const key = activeDateKey();
            const reading = key ? (plan.get(key) || 'Sem leitura cadastrada') : 'Selecione um dia';

            const totalDays = 365;
            const doy = dayOfYear(key);
            const dayNumber = doy && doy >= 1 && doy <= 366 ? Math.min(Math.max(doy, 1), totalDays) : null;
            const pct = dayNumber ? (dayNumber / totalDays) : 0;

            return {
                dateKey: key,
                dateLabel: formatDateKeyToPt(key),
                reading,
                dayNumber,
                totalDays,
                pct,
            };
        }

        function roundedRectPath(ctx, x, y, w, h, r) {
            const radius = Math.max(0, Math.min(r, Math.min(w, h) / 2));
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.arcTo(x + w, y, x + w, y + h, radius);
            ctx.arcTo(x + w, y + h, x, y + h, radius);
            ctx.arcTo(x, y + h, x, y, radius);
            ctx.arcTo(x, y, x + w, y, radius);
            ctx.closePath();
        }

        function fillRoundedRect(ctx, x, y, w, h, r, fillStyle) {
            ctx.save();
            roundedRectPath(ctx, x, y, w, h, r);
            ctx.fillStyle = fillStyle;
            ctx.fill();
            ctx.restore();
        }

        function strokeRoundedRect(ctx, x, y, w, h, r, strokeStyle, lineWidth = 2) {
            ctx.save();
            roundedRectPath(ctx, x, y, w, h, r);
            ctx.strokeStyle = strokeStyle;
            ctx.lineWidth = lineWidth;
            ctx.stroke();
            ctx.restore();
        }

        function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
            const words = String(text || '').replace(/\s+/g, ' ').trim().split(' ');
            const lines = [];
            let line = '';

            for (let i = 0; i < words.length; i++) {
                const testLine = line ? `${line} ${words[i]}` : words[i];
                if (ctx.measureText(testLine).width <= maxWidth) {
                    line = testLine;
                    continue;
                }

                if (line) lines.push(line);
                line = words[i];
                if (maxLines && lines.length >= maxLines - 1) break;
            }
            if (line && (!maxLines || lines.length < maxLines)) lines.push(line);

            const clipped = maxLines && lines.length > maxLines ? lines.slice(0, maxLines) : lines;
            clipped.forEach((l, idx) => {
                ctx.fillText(l, x, y + idx * lineHeight);
            });

            return clipped.length;
        }

        function countWrappedLines(ctx, text, maxWidth, maxLines) {
            const words = String(text || '').replace(/\s+/g, ' ').trim().split(' ');
            if (!words.length || (words.length === 1 && !words[0])) return 1;

            let lines = 0;
            let line = '';
            for (let i = 0; i < words.length; i++) {
                const testLine = line ? `${line} ${words[i]}` : words[i];
                if (ctx.measureText(testLine).width <= maxWidth) {
                    line = testLine;
                    continue;
                }

                if (line) lines += 1;
                line = words[i];
                if (maxLines && lines >= maxLines) return maxLines;
            }

            if (line) lines += 1;
            return maxLines ? Math.min(lines, maxLines) : lines;
        }

        function drawCheckIcon(ctx, cx, cy, r) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(49, 215, 230, 0.95)';
            ctx.fill();
            ctx.shadowColor = 'rgba(49, 215, 230, 0.35)';
            ctx.shadowBlur = 24;
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(5, 5, 16, 0.9)';
            ctx.lineWidth = Math.max(6, r * 0.28);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            ctx.beginPath();
            ctx.moveTo(cx - r * 0.45, cy + r * 0.02);
            ctx.lineTo(cx - r * 0.12, cy + r * 0.34);
            ctx.lineTo(cx + r * 0.52, cy - r * 0.34);
            ctx.stroke();
            ctx.restore();
        }

        function drawLogo(ctx, x, y, size) {
            const p = new Path2D(LOGO_PATH);
            const viewW = 10760;
            const viewH = 10000;
            const scale = size / Math.max(viewW, viewH);
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            ctx.fillStyle = 'rgba(49, 215, 230, 0.92)';
            ctx.shadowColor = 'rgba(49, 215, 230, 0.28)';
            ctx.shadowBlur = 24;
            ctx.fill(p);
            ctx.shadowBlur = 0;
            ctx.restore();
        }

        function drawStoryOverlay(ctx, data, W, H) {
            const margin = Math.round(W * 0.08);
            const cardW = W - margin * 2;
            const cardX = margin;

            const titleFont = Math.round(W * 0.046);
            const dateFont = Math.round(W * 0.024);
            const labelFont = Math.round(W * 0.020);
            const readingFont = Math.round(W * 0.056);
            const metaFont = Math.round(W * 0.022);

            const titleH = Math.round(titleFont * 1.08);
            const dateH = Math.round(dateFont * 1.1);
            const progressH = Math.round(H * 0.055);
            const footerH = Math.round(metaFont * 1.1);
            const gap = Math.round(H * 0.010);

            const readingLabelY = Math.round(H * 0.022);
            const readingTextTop = Math.round(H * 0.065);
            const readingBottomPad = Math.round(H * 0.026);
            const readingLineHeight = Math.round(readingFont * 1.12);
            const readingMaxLines = 5;

            const measureWidth = cardW - Math.round(W * 0.056);
            ctx.save();
            ctx.font = `900 ${readingFont}px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial`;
            const neededLines = countWrappedLines(ctx, data.reading || '—', measureWidth, readingMaxLines);
            ctx.restore();

            const minReadingH = Math.round(H * 0.12);
            const fitReadingH = readingTextTop + neededLines * readingLineHeight + readingBottomPad;
            const maxReadingH = Math.round(H * 0.22);
            const readingH = Math.min(maxReadingH, Math.max(minReadingH, fitReadingH));

            const totalH = titleH + dateH + progressH + readingH + footerH + gap * 4;
            const bottomPad = Math.round(H * 0.06);
            let y = H - bottomPad - totalH;

            ctx.save();
            ctx.font = `900 ${titleFont}px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial`;
            ctx.fillStyle = 'rgba(226, 232, 240, 0.96)';
            ctx.fillText('Scroll Bible 2026', cardX, y + titleH);
            ctx.restore();
            y += titleH + gap;

            ctx.save();
            ctx.font = `700 ${dateFont}px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial`;
            ctx.fillStyle = 'rgba(226, 232, 240, 0.74)';
            ctx.fillText('Trocando o feed, pela fome.', cardX, y + dateH);
            ctx.restore();
            y += dateH + gap;

            fillRoundedRect(ctx, cardX, y, cardW, progressH, Math.round(W * 0.03), 'rgba(0, 0, 0, 0.42)');
            strokeRoundedRect(ctx, cardX, y, cardW, progressH, Math.round(W * 0.03), 'rgba(255, 255, 255, 0.16)', 2);

            ctx.save();
            ctx.font = `800 ${Math.round(W * 0.026)}px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial`;
            ctx.fillStyle = 'rgba(226, 232, 240, 0.90)';
            const progressLabel = data.dayNumber ? `Progresso: Dia ${data.dayNumber} de ${data.totalDays}` : 'Progresso: —';
            ctx.fillText(progressLabel, cardX + Math.round(W * 0.028), y + Math.round(progressH * 0.42));
            ctx.restore();

            const barX = cardX + Math.round(W * 0.028);
            const barY = y + Math.round(progressH * 0.62);
            const barW = cardW - Math.round(W * 0.056);
            const barH = Math.round(progressH * 0.14);
            fillRoundedRect(ctx, barX, barY, barW, barH, 999, 'rgba(255, 255, 255, 0.14)');
            fillRoundedRect(ctx, barX, barY, Math.max(0, Math.min(1, data.pct)) * barW, barH, 999, 'rgba(226, 232, 240, 0.92)');

            y += progressH + gap;

            fillRoundedRect(ctx, cardX, y, cardW, readingH, Math.round(W * 0.034), 'rgba(0, 0, 0, 0.42)');
            strokeRoundedRect(ctx, cardX, y, cardW, readingH, Math.round(W * 0.034), 'rgba(255, 255, 255, 0.16)', 2);

            ctx.save();
            ctx.font = `900 ${labelFont}px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial`;
            ctx.fillStyle = 'rgba(226, 232, 240, 0.80)';
            ctx.fillText('LEITURA DO DIA', cardX + Math.round(W * 0.028), y + readingLabelY);
            ctx.restore();

            drawCheckIcon(ctx, cardX + cardW - Math.round(W * 0.058), y + readingLabelY, Math.round(W * 0.025));

            ctx.save();
            ctx.font = `900 ${readingFont}px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial`;
            ctx.fillStyle = 'rgba(49, 215, 230, 0.96)';
            wrapText(ctx, data.reading || '—', cardX + Math.round(W * 0.028), y + readingTextTop, cardW - Math.round(W * 0.056), readingLineHeight, readingMaxLines);
            ctx.restore();

            y += readingH + gap;

            ctx.save();
            ctx.font = `700 ${metaFont}px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial`;
            ctx.fillStyle = 'rgba(226, 232, 240, 0.65)';
            const footerLogoSize = Math.round(W * 0.052);
            drawLogo(ctx, cardX, y + Math.round(footerH * 0.05), footerLogoSize);
            ctx.fillText('@missaojovem.ofc', cardX + footerLogoSize + Math.round(W * 0.016), y + footerH);
            ctx.restore();
        }

        function drawImageCover(ctx, img, W, H) {
            const iw = img.naturalWidth || img.width;
            const ih = img.naturalHeight || img.height;
            if (!iw || !ih) return;
            const scale = Math.max(W / iw, H / ih);
            const sw = iw * scale;
            const sh = ih * scale;
            const dx = (W - sw) / 2;
            const dy = (H - sh) / 2;
            ctx.drawImage(img, dx, dy, sw, sh);
        }

        function drawPhotoShade(ctx, W, H) {
            ctx.save();
            const g = ctx.createLinearGradient(0, 0, 0, H);
            g.addColorStop(0, 'rgba(0, 0, 0, 0.00)');
            g.addColorStop(0.25, 'rgba(0, 0, 0, 0.30)');
            g.addColorStop(0.55, 'rgba(0, 0, 0, 0.78)');
            g.addColorStop(1, 'rgba(0, 0, 0, 0.94)');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, W, H);
            ctx.restore();
        }

        function drawStoryComposed(data, img, W, H) {
            const canvas = document.createElement('canvas');
            canvas.width = W;
            canvas.height = H;
            const ctx = canvas.getContext('2d');
            if (!ctx) throw new Error('Canvas indisponível');
            ctx.clearRect(0, 0, W, H);
            drawImageCover(ctx, img, W, H);
            drawPhotoShade(ctx, W, H);
            drawStoryOverlay(ctx, data, W, H);
            return canvas;
        }

        async function generateStoryPng() {
            const data = getStoryData();
            const W = 1080;
            const H = 1920;
            const canvas = drawStoryOverlayOnly(data, W, H);
            const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
            if (!blob) throw new Error('Não foi possível gerar o PNG');

            const safeDate = (data.dateKey || 'sem-data').replace(/[^0-9\-]/g, '');
            const fileName = `scroll-bible-2026-${safeDate}.png`;

            const file = new File([blob], fileName, { type: 'image/png' });
            if (navigator.share) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'Scroll Bible 2026',
                        text: data.reading || '',
                    });
                    return;
                } catch (err) {
                    if (err && typeof err === 'object' && 'name' in err && err.name === 'AbortError') {
                        return;
                    }
                }
            }

            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            a.remove();
            setTimeout(() => URL.revokeObjectURL(url), 2000);
        }

        function drawStoryOverlayOnly(data, W, H) {
            const canvas = document.createElement('canvas');
            canvas.width = W;
            canvas.height = H;
            const ctx = canvas.getContext('2d');
            if (!ctx) throw new Error('Canvas indisponível');
            ctx.clearRect(0, 0, W, H);
            drawStoryOverlay(ctx, data, W, H);
            return canvas;
        }

        function updateStoryPreview() {
            if (!els.storyPreview) return;
            const ctx = els.storyPreview.getContext('2d');
            if (!ctx) return;

            const data = getStoryData();
            const W = els.storyPreview.width;
            const H = els.storyPreview.height;

            ctx.clearRect(0, 0, W, H);
            if (story.photoImg) {
                drawImageCover(ctx, story.photoImg, W, H);
                drawPhotoShade(ctx, W, H);
                drawStoryOverlay(ctx, data, W, H);
            } else {
                fillRoundedRect(ctx, 14, 14, W - 28, H - 28, 24, 'rgba(0, 0, 0, 0.35)');
                ctx.save();
                ctx.font = '800 22px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
                ctx.fillStyle = 'rgba(226, 232, 240, 0.78)';
                ctx.fillText('Escolha uma foto para gerar o Stories', 34, 64);
                ctx.restore();
                drawStoryOverlay(ctx, data, W, H);
            }
        }

        function renderReading() {
            const key = activeDateKey();
            els.readingDate.textContent = formatDateKeyToPt(key);
            if (!key) {
                els.readingText.textContent = 'Selecione um dia';
                return;
            }
            els.readingText.textContent = plan.get(key) || 'Sem leitura cadastrada';
        }

        function renderReflections() {
            const key = activeDateKey();
            els.refDate.textContent = formatDateKeyToPt(key);

            if (reflectionsState.loading) {
                els.refList.style.display = 'none';
                els.refState.style.display = 'block';
                els.refState.textContent = 'Carregando reflexões…';
                return;
            }

            if (reflectionsState.error) {
                els.refList.style.display = 'none';
                els.refState.style.display = 'block';
                els.refState.textContent = 'Não foi possível carregar as reflexões.';
                return;
            }

            if (!key) {
                els.refList.style.display = 'none';
                els.refState.style.display = 'block';
                els.refState.textContent = 'Selecione um dia para ver reflexões.';
                return;
            }

            const listRaw = reflectionsState.byDate.get(key) || [];
            const list = listRaw
                .map((item, idx) => ({ item, idx, featured: isPrOtavio(item?.['Seu Nome Completo']) }))
                .sort((a, b) => {
                    if (a.featured !== b.featured) return a.featured ? -1 : 1;
                    return a.idx - b.idx;
                })
                .map((x) => x.item);
            if (!list.length) {
                els.refList.style.display = 'none';
                els.refState.style.display = 'block';
                els.refState.textContent = 'Nenhuma reflexão para este dia.';
                return;
            }

            els.refState.style.display = 'none';
            els.refList.style.display = 'flex';
            els.refList.innerHTML = '';

            list.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'reflectionCard';
                if (isPrOtavio(item?.['Seu Nome Completo'])) {
                    card.classList.add('featured');
                }

                const meta = document.createElement('div');
                meta.className = 'reflectionMeta';

                const name = document.createElement('div');
                name.className = 'name';
                name.textContent = String(item?.['Seu Nome Completo'] ?? 'Anônimo').trim() || 'Anônimo';

                const time = document.createElement('div');
                time.className = 'time';
                time.textContent = formatTimeFromTimestamp(item?.['Carimbo de data/hora']);

                meta.appendChild(name);
                meta.appendChild(time);

                const text = document.createElement('div');
                text.className = 'reflectionText';
                text.textContent = String(item?.['Sua Reflexão e Devocional'] ?? '').trim();
                text.classList.add('clamped');

                card.appendChild(meta);
                card.appendChild(text);
                els.refList.appendChild(card);

                const more = document.createElement('button');
                more.type = 'button';
                more.className = 'refMore';
                more.textContent = 'Ver mais';
                more.style.display = 'none';

                more.addEventListener('click', () => {
                    const expanded = card.classList.toggle('expanded');
                    more.textContent = expanded ? 'Ver menos' : 'Ver mais';
                });

                card.appendChild(more);

                requestAnimationFrame(() => {
                    const needsMore = text.scrollHeight > text.clientHeight + 2;
                    more.style.display = needsMore ? 'inline-flex' : 'none';
                    if (!needsMore) {
                        text.classList.remove('clamped');
                    }
                });
            });
        }

        async function fetchReflections() {
            reflectionsState.loading = true;
            reflectionsState.error = null;
            renderReflections();

            try {
                const res = await fetch(REFLECTIONS_URL);
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }
                const data = await res.json();
                const rows = Array.isArray(data) ? data : (Array.isArray(data?.data) ? data.data : []);

                const byDate = new Map();
                rows.forEach((item) => {
                    if (!toBool(item?.Exibir)) return;
                    const key = dateKeyFromSheetItem(item);
                    if (!key) return;
                    const arr = byDate.get(key) || [];
                    arr.push(item);
                    byDate.set(key, arr);
                });

                reflectionsState.byDate = byDate;
                reflectionsState.loading = false;
                reflectionsState.error = null;
                renderReflections();
            } catch (err) {
                reflectionsState.loading = false;
                reflectionsState.error = err;
                renderReflections();
            }
        }

        function daysInMonth(year, monthIndex) {
            return new Date(year, monthIndex + 1, 0).getDate();
        }

        function firstDayOfMonth(year, monthIndex) {
            return new Date(year, monthIndex, 1).getDay();
        }

        function isToday(y, mIndex, d) {
            const t = new Date();
            return t.getFullYear() === y && t.getMonth() === mIndex && t.getDate() === d;
        }

        function render() {
            els.monthLabel.textContent = MONTHS_PT[state.monthIndex];
            els.yearLabel.textContent = String(YEAR);

            els.prev.disabled = state.monthIndex === 0;
            els.next.disabled = state.monthIndex === 11;

            els.grid.innerHTML = '';

            const total = daysInMonth(YEAR, state.monthIndex);
            const offset = firstDayOfMonth(YEAR, state.monthIndex);

            for (let i = 0; i < offset; i++) {
                const empty = document.createElement('div');
                empty.className = 'cell';
                empty.setAttribute('aria-disabled', 'true');
                empty.tabIndex = -1;
                els.grid.appendChild(empty);
            }

            for (let d = 1; d <= total; d++) {
                const dateKey = isoDate(YEAR, state.monthIndex, d);
                const hasReading = plan.has(dateKey);

                const cell = document.createElement('button');
                cell.type = 'button';
                cell.className = 'cell';
                if (hasReading) cell.classList.add('hasReading');
                if (isToday(YEAR, state.monthIndex, d)) cell.classList.add('isToday');
                if (state.selectedDate === dateKey) cell.classList.add('isSelected');

                cell.setAttribute('role', 'gridcell');
                cell.setAttribute('aria-label', `${d} de ${MONTHS_PT[state.monthIndex]}`);

                const span = document.createElement('span');
                span.className = 'd';
                span.textContent = String(d);
                cell.appendChild(span);

                cell.addEventListener('click', () => {
                    state.selectedDate = dateKey;
                    render();
                });

                els.grid.appendChild(cell);
            }

            renderReflections();
            renderReading();
            renderProgress();
            updateStoryPreview();
        }

        function updateTitleSpacer() {
            const titleEl = document.querySelector('.title');
            if (!titleEl) return;
            const h = Math.ceil(titleEl.getBoundingClientRect().height || 0);
            document.documentElement.style.setProperty('--title-h', `${h}px`);
        }

        els.prev.addEventListener('click', () => {
            state.monthIndex = Math.max(0, state.monthIndex - 1);
            state.selectedDate = null;
            render();
        });

        els.next.addEventListener('click', () => {
            state.monthIndex = Math.min(11, state.monthIndex + 1);
            state.selectedDate = null;
            render();
        });

        (function init() {
            const now = new Date();
            if (now.getFullYear() === YEAR) {
                state.monthIndex = now.getMonth();
            }
            updateTitleSpacer();
            render();
            fetchReflections();

            if (els.openStoryModal) {
                els.openStoryModal.classList.add('pulseHint');
            }

            window.addEventListener('resize', () => {
                updateTitleSpacer();
                updateStoryPreview();
            });

            window.addEventListener('orientationchange', () => {
                updateTitleSpacer();
                updateStoryPreview();
            });

            function openStoryModal() {
                if (!els.storyModal) return;
                els.storyModal.classList.add('open');
                updateStoryPreview();
            }

            function closeStoryModal() {
                if (!els.storyModal) return;
                els.storyModal.classList.remove('open');
            }

            if (els.openStoryModal) {
                els.openStoryModal.addEventListener('click', openStoryModal);
            }

            if (els.closeStoryModal) {
                els.closeStoryModal.addEventListener('click', closeStoryModal);
            }

            if (els.storyModal) {
                els.storyModal.addEventListener('click', (e) => {
                    if (e.target === els.storyModal) closeStoryModal();
                });
            }

            if (els.pickStoryPhoto && els.storyPhotoInput) {
                els.pickStoryPhoto.addEventListener('click', () => {
                    els.storyPhotoInput.click();
                });

                els.storyPhotoInput.addEventListener('change', async () => {
                    const file = els.storyPhotoInput.files && els.storyPhotoInput.files[0];
                    if (!file) return;

                    if (story.photoUrl) URL.revokeObjectURL(story.photoUrl);
                    story.photoFile = file;
                    story.photoUrl = URL.createObjectURL(file);

                    const img = new Image();
                    img.decoding = 'async';
                    img.src = story.photoUrl;
                    await img.decode();
                    story.photoImg = img;

                    if (els.shareComposedStory) {
                        els.shareComposedStory.disabled = false;
                        els.shareComposedStory.classList.add('pulseHint');
                    }
                    updateStoryPreview();
                });
            }

            if (els.shareOverlayOnly) {
                els.shareOverlayOnly.addEventListener('click', async () => {
                    els.shareOverlayOnly.disabled = true;
                    try {
                        await generateStoryPng();
                    } finally {
                        els.shareOverlayOnly.disabled = false;
                    }
                });
            }

            if (els.shareComposedStory) {
                els.shareComposedStory.addEventListener('click', async () => {
                    els.shareComposedStory.disabled = true;
                    try {
                        els.shareComposedStory.classList.remove('pulseHint');
                        await shareComposedStory();
                    } finally {
                        els.shareComposedStory.disabled = !story.photoImg;
                    }
                });
            }

            updateStoryPreview();
        })();
    </script>
</body>
</html>
